<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Giftie Session — Thyaga Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ff; min-height: 100vh; padding: 32px; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: #7c3aed; font-weight: 600; text-decoration: none; margin-bottom: 24px; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    h2 { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 16px; }
    table { width: 100%; background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-collapse: collapse; overflow: hidden; }
    thead { background: #6d28d9; color: white; }
    th { padding: 12px 18px; text-align: left; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    td { padding: 12px 18px; font-size: 14px; color: #374151; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf5ff; }
    .role-assistant { background: #ede9fe; color: #5b21b6; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .role-user { background: #f0fdf4; color: #166534; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .content { max-width: 480px; white-space: pre-wrap; word-break: break-word; }
    .ts { color: #9ca3af; font-size: 13px; white-space: nowrap; }
  </style>
</head>
<body>
  <a class="back" href="/admin">← Back to sessions</a>
  <h2>Session: {{ session_id[:16] }}…</h2>

  <table>
    <thead>
      <tr>
        <th>Role</th>
        <th>Message</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      {% for role, content, ts in messages %}
      <tr>
        <td>
          <span class="{{ 'role-assistant' if role == 'assistant' else 'role-user' }}">{{ role }}</span>
        </td>
        <td class="content">{{ content }}</td>
        <td class="ts">{{ ts }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
