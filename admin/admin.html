<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Giftie Admin - Thyaga</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ff; min-height: 100vh; padding: 32px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .header img { height: 36px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #1e1b4b; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #6d28d9; }
    .stat-card .label { font-size: 13px; color: #6b7280; margin-top: 2px; }
    table { width: 100%; background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-collapse: collapse; overflow: hidden; }
    thead { background: #6d28d9; color: white; }
    th { padding: 12px 18px; text-align: left; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    td { padding: 12px 18px; font-size: 14px; color: #374151; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf5ff; }
    .mono { font-family: monospace; color: #6d28d9; }
    .badge { background: #ede9fe; color: #5b21b6; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
    .view-link { color: #7c3aed; font-weight: 600; text-decoration: none; }
    .view-link:hover { text-decoration: underline; }
    .delete-btn { background: none; border: none; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; }
    .delete-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/tglogo.png" alt="Thyaga">
    <h1>Giftie Admin</h1>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="num">{{ total }}</div>
      <div class="label">Total Sessions</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Session ID</th>
        <th>Started</th>
        <th>Messages</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for sid, started, count in sessions %}
      <tr>
        <td class="mono">{{ sid[:16] }}…</td>
        <td>{{ started }}</td>
        <td><span class="badge">{{ count }}</span></td>
        <td style="display:flex;gap:16px;align-items:center;">
          <a class="view-link" href="/admin/session/{{ sid }}">View →</a>
          <form method="POST" action="/admin/session/{{ sid }}/delete" onsubmit="return confirm('Delete this session?')">
            <button class="delete-btn" type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
