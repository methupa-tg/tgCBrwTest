<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giftie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="header-avatar"><img src="tglogo.png" alt="Giftie"></div>
      <div class="header-info">
        <h1>Giftie</h1>
        <span class="status">Your Smart Gifting Assistant</span>
      </div>
    </header>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="bubble">
          Hey! 👋 I’m Giftie 🎁<br>
          Got a birthday, wedding, or special moment coming up?<br>
          I’ll help you find something perfect<br>
          What’s the occasion?
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">🎁 Gift ideas for a birthday</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💍 Best voucher for a wedding</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">❓ How do I redeem a voucher?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💳 How can I Top Up?</button>
    </div>

    <div class="privacy-notice" id="privacyNotice">
      By chatting, you agree to our <a href="https://thyaga.lk/privacy-policy" target="_blank">Privacy Policy</a>. Conversations may be reviewed to improve our service.
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
      <input
        type="text"
        id="userInput"
        placeholder="Ask about voucher suggestions or anything else!"
        autocomplete="off"
        maxlength="500"
        oninput="updateCharCount()"
      />
      <span class="char-count" id="charCount">500</span>
      </div>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
